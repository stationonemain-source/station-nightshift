<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Book your free 15-minute call · Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F4F2ED;color:#16181d;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .page{max-width:860px;margin:0 auto;padding:0 20px 40px}
  header{display:flex;justify-content:space-between;align-items:center;padding:22px 0 18px;border-bottom:1px solid rgba(22,24,29,.12);margin-bottom:28px}
  .wordmark{font-weight:800;font-size:15px;letter-spacing:-.02em;color:#16181d;text-decoration:none}
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8e929c}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:30px;letter-spacing:-.01em;margin-bottom:6px}
  .sub{color:#4a4e57;font-size:15px;margin-bottom:22px}
  .widget{background:#fff;border:1px solid rgba(22,24,29,.12);border-radius:12px;overflow:hidden;min-height:760px}
  .widget iframe{width:100%;min-height:760px;border:none;display:block}
  footer{margin-top:26px;text-align:center;font-size:12.5px;color:#8e929c}
</style>
</head>
<body>
<div class="page">
  <header><a class="wordmark" href="/">STATION</a><span class="mono">Free 15-minute call</span></header>
  <h1>Grab 15 minutes.</h1>
  <p class="sub">No pitch deck, no contracts — we walk through what we found for your business and you keep the audit either way.</p>
  <div class="widget">
    <iframe src="https://api.leadconnectorhq.com/widget/bookings/station-intro-call" title="Book your call" loading="eager"></iframe>
  </div>
  <footer>Station · station.solutions · main@station.solutions</footer>
</div>
</body>
</html>
